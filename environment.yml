name: imtolego
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pip>=23.0
  # PyTorch (CPU-only on macOS, CUDA on Linux)
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - numpy>=1.24.0
  - pillow>=10.1.0
  - imageio>=2.31.0
  - cmake
  - cxx-compiler
  - git
  - pip:
      - transformers==4.35.0
      - einops==0.7.0
      - omegaconf==2.3.0
      - trimesh>=4.4.0
      - huggingface-hub
      - rembg
      # Build torchmcubes manually after env activation:
      #   pip install git+https://github.com/tatsy/torchmcubes.git
      #   pip install onnxruntime "imageio[ffmpeg]"
      # Web API
      - fastapi>=0.104.0
      - uvicorn[standard]>=0.24.0
      - python-multipart>=0.0.6
      - pydantic>=2.0.0
      - pydantic-settings>=2.0.0
      - prometheus-client>=0.19.0
      # Logging / Utils
      - structlog>=23.0.0
      - celery>=5.3.0
      - redis>=5.0.0
      # Testing
      - pytest
      - httpx
